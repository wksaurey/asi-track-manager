<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ASI Track Manager</title>
</head>
<body>
  <h1>ASI Track Manager</h1>
  <hr>

  {% if user.is_authenticated %}
    <p>Logged in as <strong>{{ user.username }}</strong> &mdash; <a href="{% url 'users:logout' %}">Logout</a></p>
    <ul>
      <li><a href="{% url 'asi_assets:index' %}">Assets (Tracks &amp; Vehicles)</a></li>
      <li><a href="{% url 'reservations:reservation_list' %}">My Reservations</a></li>
      <li><a href="{% url 'reservations:reservation_create' %}">New Reservation</a></li>
      <li><a href="{% url 'cal:calendar' %}">Calendar</a></li>
    </ul>
    {% if user.is_staff %}
      <p><a href="{% url 'admin:index' %}">Admin</a></p>
    {% endif %}
  {% else %}
    <p><a href="{% url 'users:login' %}">Login</a> &mdash; <a href="{% url 'users:register' %}">Register</a></p>
  {% endif %}
</body>
</html>
