<h1>Tracks</h1>
{% if tracks %}
    <ul>
    {% for track in tracks %}
        <li><a href="{% url 'asi_assets:track_detail' track.id %}">{{ track.name }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>No tracks available.</p>
{% endif %}

<h1>Vehicles</h1>
{% if vehicles %}
    <ul>
    {% for vehicle in vehicles %}
        <li><a href="{% url 'asi_assets:vehicle_detail' vehicle.id %}">{{ vehicle.name }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>No vehicles available.</p>
{% endif %}
