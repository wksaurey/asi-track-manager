{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.10/css/all.css"
        integrity="sha384-+d0P83n9kaQMCwj8F4RJB66tzIwOKmrdb46+porD/OvrJ+37WqIM7UoBtwHO6Nlg" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="{% static 'cal/css/styles.css' %}">
  <title>ASI Track Manager — Sign In</title>
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand header -->
      <div class="login-brand">
        <div class="login-brand-icon"><i class="fas fa-hard-hat"></i></div>
        <h1 class="login-brand-title">ASI Track Manager</h1>
        <p class="login-brand-sub">Heavy Equipment Asset Scheduling</p>
      </div>

      {% if error %}
      <div class="login-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <div class="login-panels">

        <!-- ── Regular user panel ── -->
        <div class="login-panel">
          <h3 class="login-panel-title">
            <i class="fas fa-user"></i> Sign In
          </h3>
          <p class="login-panel-sub">Enter your name to view and schedule events</p>
          <form method="post" action="{% url 'cal:login' %}">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="user">
            <div class="login-field">
              <input
                type="text"
                name="user_name"
                class="login-input"
                placeholder="Your Name"
                autocomplete="name"
                required
              >
            </div>
            <button type="submit" class="login-btn login-btn-user">
              Enter <i class="fas fa-arrow-right"></i>
            </button>
          </form>
        </div>

        <!-- Divider -->
        <div class="login-divider">
          <span>or</span>
        </div>

        <!-- ── Admin panel ── -->
        <div class="login-panel login-panel-admin">
          <h3 class="login-panel-title">
            <i class="fas fa-user-shield"></i> Admin Login
          </h3>
          <p class="login-panel-sub">Full access: approve, delete, manage assets</p>
          <form method="post" action="{% url 'cal:login' %}">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="admin">
            <div class="login-field">
              <input
                type="text"
                name="username"
                class="login-input"
                placeholder="Username"
                autocomplete="username"
                required
              >
            </div>
            <div class="login-field">
              <input
                type="password"
                name="password"
                class="login-input"
                placeholder="Password"
                autocomplete="current-password"
                required
              >
            </div>
            <button type="submit" class="login-btn login-btn-admin">
              Admin Login <i class="fas fa-lock"></i>
            </button>
          </form>
        </div>

      </div><!-- /login-panels -->
    </div><!-- /login-card -->
  </div><!-- /login-wrapper -->

</body>
</html>
