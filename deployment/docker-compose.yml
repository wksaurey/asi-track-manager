version: "3.8"

services:
  web:
    build: .
    env_file: .env
    volumes:
      - db-data:/app/db
      - static-files:/app/staticfiles
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
      - static-files:/srv/static:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db-data:
  static-files:
  caddy-data:
  caddy-config:
