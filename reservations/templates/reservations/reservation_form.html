<!DOCTYPE html>
<html>
<head><title>New Reservation</title></head>
<body>
  <h1>New Reservation</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% if form.errors %}
      <ul>
        {% for error in form.non_field_errors %}
          <li>{{ error }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    <button type="submit">Reserve</button>
  </form>
  <a href="{% url 'reservation_list' %}">Cancel</a>
</body>
</html>
